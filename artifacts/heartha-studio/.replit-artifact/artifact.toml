kind = "web"
previewPath = "/"
title = "Heartha Studio"
version = "1.0.0"
id = "artifacts/heartha-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19878

[services.development]
run = "pnpm --filter @workspace/heartha-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heartha-studio", "run", "build" ]
publicDir = "artifacts/heartha-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19878"
BASE_PATH = "/"
